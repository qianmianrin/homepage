<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的文档阅读器</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #controls { padding: 10px; background-color: #f4f4f4; border-bottom: 1px solid #ddd; }
        select { padding: 5px; font-size: 16px; margin-left: 10px; }
        iframe { width: 100%; flex-grow: 1; border: none; display: block; }
    </style>
</head>
<body>

    <div id="controls">
        <label for="pdf-selector">请选择文档：</label>
        <select id="pdf-selector" onchange="changePDF()">
            <option value="">正在加载书目列表...</option>
        </select>
    </div>

    <iframe id="pdf-viewer" src="">
        您的浏览器不支持内嵌 PDF，请下载查看。
    </iframe>

    <script>
        window.onload = function() {
            // 直接读取同目录下的静态 json 文件，没有任何外部 API 限制
            fetch('book_list.json')
                .then(response => response.json())
                .then(files => {
                    const selector = document.getElementById("pdf-selector");
                    selector.innerHTML = ''; // 清空提示
                    
                    // 如果 JSON 列表为空
                    if (files.length === 0) {
                        selector.innerHTML = '<option value="">未找到 PDF 文件</option>';
                        return;
                    }

                    // 遍历 JSON 里的文件名，生成下拉选项
                    files.forEach(filename => {
                        const option = document.createElement('option');
                        // 拼接路径，例如 "books/化羽.pdf"
                        option.value = 'books/' + filename; 
                        // 截去 .pdf 后缀作为显示文字
                        option.textContent = filename.replace('.pdf', ''); 
                        selector.appendChild(option);
                    });

                    // 默认显示列表中的第一本书
                    document.getElementById("pdf-viewer").src = 'books/' + files[0];
                })
                .catch(error => {
                    console.error('读取书目数据失败:', error);
                    document.getElementById("pdf-selector").innerHTML = '<option value="">数据加载失败</option>';
                });
        };

        function changePDF() {
            var selector = document.getElementById("pdf-selector");
            var selectedFile = selector.options[selector.selectedIndex].value;
            if (selectedFile) {
                document.getElementById("pdf-viewer").src = selectedFile;
            }
        }
    </script>

</body>
</html>
