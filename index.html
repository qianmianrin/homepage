<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
            color: #e0e0e0;
            background: #1a1a2e;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        /* ====== Navigation ====== */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; height: 56px;
            background: rgba(22, 22, 40, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        nav .brand { font-size: 18px; font-weight: 700; letter-spacing: 1px; color: #fff; }
        nav .nav-links { display: flex; gap: 28px; list-style: none; }
        nav .nav-links a {
            color: #b0b0c0; text-decoration: none; font-size: 14px; font-weight: 500;
            transition: color 0.2s;
        }
        nav .nav-links a:hover { color: #fff; }

        /* ====== Hero ====== */
        #hero {
            position: relative; min-height: 100vh; display: flex;
            align-items: center; justify-content: center; overflow: hidden;
        }
        /* 两层背景图片交叉渐变 */
        #hero .bg {
            position: absolute; inset: 0;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            filter: brightness(0.45);
            transform: scale(1.05);
            z-index: 0;
        }
        #hero .bg1 {
            background-image: url('figs/pic1.bmp');
            animation: crossfadeBg1 10s ease-in-out infinite;
        }
        #hero .bg2 {
            background-image: url('figs/pic2.jpg');
            animation: crossfadeBg2 10s ease-in-out infinite;
        }
        @keyframes crossfadeBg1 {
            0%, 40%   { opacity: 1; }
            50%, 90%  { opacity: 0; }
            100%      { opacity: 1; }
        }
        @keyframes crossfadeBg2 {
            0%, 40%   { opacity: 0; }
            50%, 90%  { opacity: 1; }
            100%      { opacity: 0; }
        }
        #hero .overlay {
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(26,26,46,0.3) 0%, rgba(26,26,46,0.85) 100%);
            z-index: 1;
        }
        #hero .hero-content {
            position: relative; z-index: 2; text-align: center;
            padding: 0 24px; max-width: 640px;
        }
        #hero .hero-content h1 {
            font-size: clamp(36px, 6vw, 64px); font-weight: 800; letter-spacing: 3px;
            color: #fff; margin-bottom: 16px;
            text-shadow: 0 2px 24px rgba(0,0,0,0.5);
        }
        #hero .hero-content .subtitle {
            font-size: clamp(16px, 2.5vw, 22px);
            color: rgba(255,255,255,0.78);
            font-weight: 300; letter-spacing: 5px;
        }
        #hero .scroll-hint {
            position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
            z-index: 2; color: rgba(255,255,255,0.45); font-size: 13px;
            letter-spacing: 2px; animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        /* ====== Sections ====== */
        section { padding: 80px 24px; }
        .section-inner { max-width: 900px; margin: 0 auto; }
        .section-title {
            font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 32px;
            letter-spacing: 2px; text-align: center;
        }
        .section-title::after {
            content: ''; display: block; width: 48px; height: 3px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            margin: 12px auto 0; border-radius: 2px;
        }

        /* ====== About ====== */
        #about { background: #1e1e36; }
        #about p {
            color: #c0c0d0; font-size: 16px; text-align: center;
            max-width: 600px; margin: 0 auto;
        }
        #about .tag-list {
            display: flex; flex-wrap: wrap; gap: 10px;
            justify-content: center; margin-top: 28px;
        }
        #about .tag {
            padding: 6px 18px; border-radius: 20px; font-size: 13px; font-weight: 500;
            background: rgba(99,102,241,0.15); color: #a5b4fc;
            border: 1px solid rgba(99,102,241,0.25);
        }

        /* ====== Reader CTA ====== */
        #reader-cta { background: #1a1a2e; text-align: center; }
        #reader-cta .cta-card {
            display: inline-block; padding: 36px 56px;
            background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(168,85,247,0.08));
            border: 1px solid rgba(99,102,241,0.2); border-radius: 16px;
            text-decoration: none; color: #e0e0e0; transition: all 0.3s;
        }
        #reader-cta .cta-card:hover {
            border-color: rgba(99,102,241,0.5);
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(168,85,247,0.14));
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99,102,241,0.15);
        }
        #reader-cta .cta-card .cta-icon { font-size: 40px; margin-bottom: 12px; }
        #reader-cta .cta-card .cta-title { font-size: 20px; font-weight: 700; color: #fff; }
        #reader-cta .cta-card .cta-desc { font-size: 14px; color: #999; margin-top: 6px; }

        /* ====== Contact ====== */
        #contact { background: #1e1e36; }
        #contact .contact-links {
            display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
        }
        #contact .contact-links a {
            color: #999; text-decoration: none; font-size: 15px;
            padding: 10px 24px; border-radius: 8px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.2s;
        }
        #contact .contact-links a:hover {
            color: #fff; border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
        }

        /* ====== Footer ====== */
        footer {
            text-align: center; padding: 36px 24px;
            color: #555; font-size: 13px;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: #16162a;
        }

        /* ====== Responsive ====== */
        @media (max-width: 640px) {
            nav { padding: 0 16px; }
            nav .nav-links { gap: 16px; }
            nav .nav-links a { font-size: 13px; }
            section { padding: 60px 16px; }
            #reader-cta .cta-card { padding: 28px 36px; }
        }
    </style>
</head>
<body>

    <!-- ==================== Navigation ==================== -->
    <nav>
        <div class="brand"> 主页</div>
        <ul class="nav-links">
            <li><a href="#hero">首页</a></li>
            <li><a href="#about">关于</a></li>
            <li><a href="reader.html">阅读</a></li>
        </ul>
    </nav>

    <!-- ==================== Hero ==================== -->
    <section id="hero">
        <div class="bg bg1"></div>
        <div class="bg bg2"></div>
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>你好，欢迎来访</h1>
            <p class="subtitle">读 万 卷 书 ， 行 万 里 路</p>
        </div>
        <div class="scroll-hint">↓ 向下探索</div>
    </section>

    <!-- ==================== About ==================== -->
    <section id="about">
        <div class="section-inner">
            <h2 class="section-title">关于我</h2>
            <p>热爱阅读、写作与思考。这里是我的个人主页，记录学习与创作的足迹。</p>
            <div class="tag-list">
            
                <span class="tag"> 写作</span>
                <span class="tag"> 编程</span>
                <span class="tag"> 数学</span>
                <span class="tag"> 历史</span>
            </div>
        </div>
    </section>

    <!-- ==================== Reader CTA ==================== -->
    <section id="reader-cta">
        <div class="section-inner">
            <h2 class="section-title">阅读区</h2>
            <a class="cta-card" href="reader.html">
                <div class="cta-icon">📖</div>
                <div class="cta-title">打开文档阅读器</div>
                <div class="cta-desc">浏览 PDF 文档，支持滚动与滑动阅读</div>
            </a>
        </div>
    </section>



    <!-- ==================== Footer ==================== -->
    <footer>
        <p>© 2026 个人主页.</p>
    </footer>
</body>
</html>
